repos:
  # Custom coverage update and checks
  - repo: local
    hooks:
      - id: coverage-update-backend
        name: Backend Coverage Update
        entry: python backend/update_coverage.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: coverage-update-frontend
        name: Frontend Coverage Update
        entry: node frontend/update-coverage.js
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: coverage-backend
        name: Backend Coverage Check
        entry: python backend/check_coverage.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      - id: coverage-frontend-check
        name: Frontend Coverage Check
        entry: node frontend/check-coverage.js
        language: system
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

  # Code formatting and linting for Python
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        language_version: python3.14
        args: ['--line-length=100']

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ['--profile', 'black']

  - repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        args: ['--max-line-length=100', '--exclude=__pycache__,venv,.venv']

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-json
      - id: check-merge-conflict

  # Security checks for Python
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: ['-c', 'bandit.yaml']
        exclude: '^tests/'

ci:
  autofix_commit_msg: 'chore: auto fixes from pre-commit hooks'
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: 'chore: update pre-commit hooks'
  skip: []
