services:
  postgres:
    image: postgres:16-alpine
    container_name: timetracker_postgres
    environment:
      POSTGRES_USER: timetracker
      POSTGRES_PASSWORD: timetracker_password
      POSTGRES_DB: timetracker_db
      PGDATA: /var/lib/postgresql/time-tracker-data
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/time-tracker-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
